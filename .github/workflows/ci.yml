name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -ra
        env:
          # Hermeticity: any test that reaches the network must fail loudly.
          NO_PROXY: "*"
          HTTP_PROXY: "http://127.0.0.1:1"
          HTTPS_PROXY: "http://127.0.0.1:1"

  lint:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: mypy src/
